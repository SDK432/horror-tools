<!DOCTYPE html>
<html>
<head>

<title>Creepypasta Title Generator</title>

<meta name="description" content="Generate creepy creepypasta titles instantly.">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background-image:url("https://images.unsplash.com/photo-1509248961158-e54f6934749c");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.85);
min-height:100vh;
padding:40px 20px;
}

.hero{
max-width:800px;
margin:auto;
background:rgba(0,0,0,0.9);
padding:40px;
border-radius:12px;
box-shadow:0 0 40px rgba(255,0,0,0.5);
text-align:center;
}

h1{
color:#ff2e2e;
font-size:42px;
}

.tagline{
color:#ccc;
margin-bottom:20px;
}

input{
width:80%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#ff2e2e;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#ff5555;
}

.results{
margin-top:25px;
text-align:left;
}

.item{
background:#000;
padding:10px;
margin:8px 0;
border-radius:6px;
display:flex;
justify-content:space-between;
}

.copy{
background:#333;
padding:5px 10px;
cursor:pointer;
border-radius:4px;
}

.copy:hover{
background:#666;
}

</style>

</head>

<body>

<div class="overlay">

<div class="hero">

<h1>Creepypasta Title Generator</h1>

<p class="tagline">
Create disturbing creepypasta story titles instantly.
</p>

<input id="idea" placeholder="Enter a creepypasta topic (example: haunted game)">

<br>

<button onclick="generate()">Generate Titles</button>

<div class="results" id="results"></div>

</div>

</div>

<script>

function generate(){

let idea=document.getElementById("idea").value

if(idea===""){
idea="creepypasta"
}

let templates=[

"The Reddit Thread About "+idea,
"The "+idea+" Story That Disappeared",
"The Post About "+idea+" That Went Viral",
"The Dark Secret Behind "+idea,
"The "+idea+" Story Nobody Believed",
"The Night I Read About "+idea,
"The Message Hidden In The "+idea+" Story",
"The "+idea+" Thread Posted At 3AM",
"The Internet Story About "+idea,
"The "+idea+" Story I Wish I Never Found"

]

let used=[]
let results=""

for(let i=0;i<5;i++){

let random

do{
random=templates[Math.floor(Math.random()*templates.length)]
}
while(used.includes(random))

used.push(random)

results+=`
<div class="item">
<span>${random}</span>
<span class="copy" onclick="copyText('${random}')">copy</span>
</div>
`

}

document.getElementById("results").innerHTML=results

}

function copyText(text){

navigator.clipboard.writeText(text)
alert("Copied!")

}

generate()

</script>

</body>
</html>
