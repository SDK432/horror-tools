<!DOCTYPE html>
<html>
<head>

<title>Creepypasta Title Generator</title>

<meta name="description" content="Generate creepy creepypasta story titles instantly.">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(180deg,#000,#1a0000);
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
box-shadow:0 0 30px rgba(255,0,0,0.3);
}

h1{color:#ff2e2e;}

button{
margin-top:20px;
padding:12px 20px;
background:#ff2e2e;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.results{margin-top:20px;}

.title{
background:#000;
padding:10px;
margin:8px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>Creepypasta Title Generator</h1>

<button onclick="generate()">Generate Titles</button>

<div class="results" id="results"></div>

</div>

<script>

function generate(){

let titles=[

"The Reddit Story That Ruined My Life",
"The Thread Posted At 3AM",
"The Creepypasta That Became Real",
"The Story No One Should Read",
"The Message Hidden In The Thread",
"The Darkest Story On The Internet",
"The Post That Disappeared",
"The Creepypasta Nobody Believed",
"The Story I Wish I Never Read",
"The Thread That Should Not Exist"

]

let results=""

for(let i=0;i<5;i++){

let random=titles[Math.floor(Math.random()*titles.length)]

results+=`<div class="title">${random}</div>`

}

document.getElementById("results").innerHTML=results

}

generate()

</script>

</body>
</html>
